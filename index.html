<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/chartist.js/latest/chartist.min.css">
    <script src="//cdn.jsdelivr.net/chartist.js/latest/chartist.min.js"></script>
    <title>Document</title>
</head>
<body>
    <h1>Películas de Star Wars</h1>
    <section id="grafica-lineas">
        <h2>Gráfica de líneas</h2>
        <section class="ejes">
            <p class="x">Eje X: Nombre de la película </p>
            <p class="y">Eje Y: Año de publicación</p>
        </section>
        <div class="ct-chart"></div>
    </section>
    <section id="grafica-barras">
        <h2>Gráfica de barras</h2>
        <section class="ejes">
            <p class="x">Eje X: Nombre del personaje </p>
            <p class="y">Eje Y: Número de pelis que ha participado</p>
        </section>
        <div class="ct-chart2"></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
